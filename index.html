<meta name="mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-title" content="WC 2026">

<title>World Cup 2026 by Freddy</title>
<style>
:root{
 --green:#0b8a45; --green-d:#076b35; --blue:#1f6feb; --gold:#f7c948; --red:#e4572e;
 --bg:#0c1016; --bg2:#11161e; --card:#161d27; --card2:#1d2530; --line:#28313d;
 --txt:#eef2f7; --mut:#8c98a8; --win:#1f8f4d;
 --shadow:0 8px 24px rgba(0,0,0,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
 font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
 -webkit-font-smoothing:antialiased;}
body{padding-bottom:calc(70px + env(safe-area-inset-bottom));}
.app{max-width:820px;margin:0 auto;min-height:100vh;}
/* top bar */
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:10px;
 background:linear-gradient(120deg,var(--green-d),var(--green) 55%,var(--blue));
 padding:calc(env(safe-area-inset-top) + 11px) 14px 12px;box-shadow:var(--shadow);}
.topbar .bk{background:rgba(255,255,255,.16);border:none;color:#fff;font-size:15px;font-weight:600;
 border-radius:10px;padding:8px 12px;font-family:inherit;cursor:pointer;display:none;white-space:nowrap;}
.topbar.sub .bk{display:inline-block;}
.topbar .ttl{font-size:17px;font-weight:800;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
 display:flex;align-items:center;gap:8px;}
.langpills{display:flex;gap:4px;background:rgba(0,0,0,.18);border-radius:20px;padding:3px;}
.langpills button{border:none;background:none;color:rgba(255,255,255,.7);font-weight:700;font-size:12px;
 padding:5px 9px;border-radius:16px;cursor:pointer;font-family:inherit;}
.langpills button.on{background:#fff;color:var(--green-d);}
.screen{padding:14px;}
/* bottom nav */
nav{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;background:#0a0e14;
 border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 18px rgba(0,0,0,.4);}
nav button{flex:1;background:none;border:none;color:var(--mut);padding:9px 2px 7px;font-size:10.5px;font-weight:700;
 display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-family:inherit;}
nav button .ic{font-size:20px;}
nav button.active{color:var(--gold);}
/* hero */
.hero{background:linear-gradient(135deg,rgba(11,138,69,.30),rgba(31,111,235,.22));
 border:1px solid var(--line);border-radius:18px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden;text-align:center;}
.hero h1{margin:0;font-size:26px;font-weight:900;letter-spacing:-.4px;}
.hero .byline{display:inline-block;margin-top:7px;background:var(--gold);color:#241a00;font-weight:900;
 font-size:13px;padding:4px 13px;border-radius:20px;letter-spacing:.3px;}
.hero p{margin:11px 0 0;font-size:13px;color:var(--mut);}
.hero .flags{font-size:25px;margin-top:7px;letter-spacing:3px;}
.hero .stripe{position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;
 background:radial-gradient(circle,rgba(247,201,72,.32),transparent 70%);}
/* section heading */
.sech{display:flex;align-items:center;justify-content:space-between;margin:20px 2px 10px;}
.sech h2{font-size:16px;margin:0;font-weight:900;}
.note{font-size:12px;color:var(--mut);line-height:1.6;background:var(--card);border:1px solid var(--line);
 border-radius:12px;padding:12px;margin-bottom:13px;}
/* match card */
.daylbl{font-size:12.5px;color:var(--gold);font-weight:900;text-transform:uppercase;letter-spacing:.6px;margin:18px 4px 9px;}
.mcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:9px;}
.mcard .top{display:flex;justify-content:space-between;font-size:11px;color:var(--mut);margin-bottom:9px;align-items:center;}
.gtag{color:var(--green-d);background:var(--gold);font-weight:800;padding:3px 9px;border-radius:20px;cursor:pointer;font-size:11px;}
.mrow{display:flex;align-items:center;gap:7px;}
.mside{flex:1;display:flex;align-items:center;gap:7px;cursor:pointer;min-width:0;}
.mside.h{justify-content:flex-end;text-align:right;}
.mside .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700;font-size:14px;}
.mside .fl{font-size:22px;}
.scin{width:38px;height:38px;text-align:center;font-size:17px;font-weight:900;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--gold);font-family:inherit;}
.scin:focus{outline:none;border-color:var(--gold);}
.dash{color:var(--mut);font-weight:700;font-size:13px;}
.mbot{margin-top:10px;display:flex;flex-direction:column;gap:6px;}
.place{font-size:12px;color:var(--txt);cursor:pointer;font-weight:600;}
.place u{text-decoration:underline dotted;color:var(--mut);}
.tvrow{font-size:11px;color:var(--mut);display:flex;flex-wrap:wrap;gap:4px 8px;align-items:center;}
.tvrow .lbl{color:var(--gold);font-weight:700;}
.tvch{background:var(--card2);border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-weight:700;color:var(--txt);}
.tvch b{color:var(--gold);}
/* group list cards */
.glist{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.gcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px;cursor:pointer;}
.gcard h3{margin:0 0 9px;font-size:14px;font-weight:800;}
.gcard h3 .lbl{color:var(--gold);}
.gcard .grow{display:flex;align-items:center;gap:6px;font-size:12.5px;padding:2px 0;}
.gcard .grow .fl{font-size:15px;}
.gcard .grow .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
/* standings table */
.group{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:14px;overflow:hidden;}
.ghead{background:var(--card2);padding:11px 15px;font-weight:800;font-size:15px;}
.ghead .lbl{color:var(--gold);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{padding:8px 3px;text-align:center;}
th{color:var(--mut);font-weight:700;font-size:10px;text-transform:uppercase;border-bottom:1px solid var(--line);}
td.team{text-align:left;padding-left:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;cursor:pointer;}
tr.q1 td{background:rgba(31,143,77,.30);} tr.q2 td{background:rgba(247,201,72,.16);} tr.q3 td{background:rgba(247,201,72,.07);}
.pos{color:var(--mut);width:16px;} .flag{font-size:15px;margin-right:5px;} .pts{font-weight:900;color:var(--gold);}
.matches{padding:7px 11px 13px;}
.match{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 2px;border-bottom:1px solid rgba(40,49,61,.55);}
.match:last-child{border-bottom:none;}
.mteam{flex:1;display:flex;align-items:center;gap:5px;font-size:13px;min-width:0;}
.mteam.home{justify-content:flex-end;text-align:right;} .mteam .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.legend{font-size:11px;color:var(--mut);margin:4px 2px 16px;line-height:1.7;}
.dot{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:middle;margin-right:4px;}
/* teams grid */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.tcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 11px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.tcard .fl{font-size:27px;} .tcard .tn{font-weight:700;font-size:13.5px;} .tcard .tg{font-size:10.5px;color:var(--mut);}
/* city cards */
.ccard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;}
.ccard h3{margin:0 0 3px;font-size:15.5px;} .ccard .meta{font-size:12px;color:var(--gold);font-weight:700;margin-bottom:6px;}
.ccard p{margin:0;font-size:12px;color:var(--mut);line-height:1.5;}
/* info blocks */
.infoblock{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:12px;}
.infoblock h4{margin:0 0 8px;font-size:13px;color:var(--gold);text-transform:uppercase;letter-spacing:.4px;}
.infoblock p{margin:0;font-size:13.5px;line-height:1.65;color:var(--txt);}
.kv{display:flex;justify-content:space-between;font-size:13.5px;padding:7px 0;border-bottom:1px solid var(--line);}
.kv:last-child{border-bottom:none;} .kv span:first-child{color:var(--mut);} .kv b{font-weight:800;}
.chip{display:inline-block;background:var(--card2);border:1px solid var(--line);border-radius:20px;padding:6px 12px;font-size:12px;margin:3px 5px 3px 0;cursor:pointer;font-weight:600;}
.chip.s{background:rgba(31,143,77,.18);border-color:rgba(31,143,77,.5);color:#bff0d0;}
.chip.w{background:rgba(228,87,46,.14);border-color:rgba(228,87,46,.45);color:#ffd0c2;}
/* buttons */
.btn{background:var(--green);color:#fff;border:none;border-radius:12px;padding:13px 16px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;width:100%;margin-bottom:10px;}
.btn.alt{background:var(--card2);border:1px solid var(--line);} .btn.danger{background:#7a2418;} .btn.blue{background:var(--blue);}
/* pitch */
.pitch{background:linear-gradient(#149148,#0d6c38);border-radius:16px;padding:16px 8px;position:relative;border:2px solid #1ba055;margin-bottom:14px;}
.pitch::before{content:"";position:absolute;top:50%;left:8px;right:8px;height:2px;background:rgba(255,255,255,.28);}
.pitch::after{content:"";position:absolute;top:calc(50% - 26px);left:calc(50% - 26px);width:52px;height:52px;border:2px solid rgba(255,255,255,.28);border-radius:50%;}
.prow{display:flex;justify-content:space-around;position:relative;z-index:1;margin:11px 0;}
.pp{width:64px;text-align:center;cursor:pointer;}
.pp .num{width:34px;height:34px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;font-weight:900;font-size:13px;color:var(--green-d);box-shadow:0 2px 6px rgba(0,0,0,.3);}
.pp .pn{font-size:10px;color:#fff;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700;}
/* player list */
.plist{margin-top:4px;}
.subhd{font-size:12px;color:var(--mut);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin:14px 2px 6px;}
.pli{display:flex;align-items:center;gap:10px;padding:11px 6px;border-bottom:1px solid var(--line);cursor:pointer;}
.pli .ppos{font-size:10px;font-weight:800;color:var(--green-d);background:var(--gold);border-radius:6px;width:30px;text-align:center;padding:3px 0;}
.pli .pinfo{flex:1;min-width:0;} .pli .pinm{font-weight:700;font-size:14.5px;}
.pli .pclub{font-size:11.5px;color:var(--mut);}
.pli .parr{color:var(--mut);font-size:16px;}
.editp input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:9px;font-family:inherit;font-size:13px;margin-bottom:6px;}
/* knockout */
.ko-round{margin-bottom:18px;} .ko-round h3{font-size:13px;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;margin:0 0 9px;}
.ko-match{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:9px 11px;margin-bottom:9px;}
.ko-row{display:flex;align-items:center;gap:8px;padding:4px 0;}
.ko-name{flex:1;font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--mut);}
.ko-name.set{color:var(--txt);} .ko-name.winner{color:var(--txt);font-weight:900;}
.ko-name.winner::after{content:" ‚Äö√∫√¨";color:var(--green);}
.ko-sc{width:40px;height:36px;text-align:center;font-size:15px;font-weight:800;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--txt);font-family:inherit;}
.pen{font-size:11px;color:var(--mut);text-align:center;margin-top:5px;}
.pen select{background:var(--bg);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:4px 7px;font-family:inherit;font-size:11px;}
.champ{text-align:center;padding:20px;background:linear-gradient(135deg,var(--gold),#ffd86b);color:#241a00;border-radius:16px;font-size:19px;font-weight:900;margin-bottom:16px;box-shadow:var(--shadow);}
.champ small{display:block;font-size:12px;font-weight:800;opacity:.65;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
/* map */
.mapwrap{background:linear-gradient(#0e1622,#0b1119);border:1px solid var(--line);border-radius:16px;padding:6px;margin-bottom:14px;overflow:hidden;}
.mapwrap svg{width:100%;height:auto;display:block;}
.land{fill:#1b2a22;stroke:#2e4a3a;stroke-width:1.5;}
.pin circle{fill:var(--gold);stroke:#241a00;stroke-width:1.2;}
.pin.hi circle{fill:var(--red);}
.pin text{fill:var(--txt);font-size:10px;font-weight:700;}
.maplbl{fill:#3f5468;font-size:15px;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.fade{opacity:0;animation:fade .22s forwards;}
@keyframes fade{to{opacity:1;}}
</style>
</head>

/* ---------- schedule ---------- */
function buildSchedule(){
 var list=[];
 D.ORDER.forEach(function(g){
  D.PAIRS.forEach(function(p,mi){
   var md=D.MD_OF[mi];
   var home=D.GROUPS[g][p[0]], away=D.GROUPS[g][p[1]];
   list.push({g:g,mi:mi,md:md,home:home,away:away,date:D.GDATES[g][md-1],opening:(g==="A"&&mi===0)});
  });
 });
 list.sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:(a.g<b.g?-1:a.g>b.g?1:a.mi-b.mi);});
 return list;
}
function tvHtml(m){
 var big=m.opening;
 var fr=(m.home==="France"||m.away==="France"||big)?"y":"s";
 var de=(m.home==="Germany"||m.away==="Germany"||big)?"y":"s";
 function ch(name,state){return '<span class="tvch">'+(state==="y"?'<b>'+name+'</b>':name)+'</span>';}
 return '<div class="tvrow"><span class="lbl">'+t("tv_free")+':</span>'+ch("Ô£ø√º√°¬¥Ô£ø√º√°‚àë M6",fr)+ch("Ô£ø√º√°√üÔ£ø√º√°‚Ñ¢ RTBF / VRT","y")+ch("Ô£ø√º√°¬©Ô£ø√º√°‚Ñ¢ ARD / ZDF",de)+'</div>';
}

/* ---------- standings ---------- */
function standings(g){
 var teams=D.GROUPS[g].map(function(n){return {name:n,j:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0};});
 var idx={}; teams.forEach(function(t2,i){idx[t2.name]=i;});
 D.PAIRS.forEach(function(p,mi){
  var m=ST.scores[g+"_"+mi]; if(!m||m.h==null||m.a==null)return;
  var H=teams[idx[D.GROUPS[g][p[0]]]], A=teams[idx[D.GROUPS[g][p[1]]]];
  H.j++;A.j++;H.gf+=m.h;H.ga+=m.a;A.gf+=m.a;A.ga+=m.h;
  if(m.h>m.a){H.w++;A.l++;H.pts+=3;}else if(m.h<m.a){A.w++;H.l++;A.pts+=3;}else{H.d++;A.d++;H.pts++;A.pts++;}
 });
 teams.forEach(function(x){x.gd=x.gf-x.ga;});
 teams.sort(function(a,b){return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||(a.name<b.name?-1:1);});
 return teams;
}
function groupComplete(g){for(var mi=0;mi<6;mi++){var m=ST.scores[g+"_"+mi];if(!m||m.h==null||m.a==null)return false;}return true;}
function allComplete(){return D.ORDER.every(groupComplete);}

 if(hS==null||hS===""||aS==null||aS==="")return null;
 var a=parseInt(hS,10),b=parseInt(aS,10);
 if(a>b)return n.hN; if(b>a)return n.aN; var pen=koS(id,"pen"); return pen==="h"?n.hN:pen==="a"?n.aN:null;
}
function koCompute(){
 var names={}; var seeded=allComplete();
 if(seeded){
  var winners={},runners={},thirds=[];
  D.ORDER.forEach(function(g){var s=standings(g);winners[g]=s[0].name;runners[g]=s[1].name;thirds.push({g:g,name:s[2].name,pts:s[2].pts,gd:s[2].gd,gf:s[2].gf});});
  thirds.sort(function(a,b){return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||(a.g<b.g?-1:1);});
  var top8=thirds.slice(0,8);
  var key=top8.map(function(x){return x.g;}).sort().join("");
  var assign=D.COMBOS[key]; var thirdByGroup={}; top8.forEach(function(x){thirdByGroup[x.g]=x.name;});
  function resolve(spec){ if(spec[0]==="1")return winners[spec[1]]; if(spec[0]==="2")return runners[spec[1]];
   var col=parseInt(spec.slice(2),10); return thirdByGroup[assign[col]]; }
  KO_R32.forEach(function(pp,i){ names["r32_"+i]={hN:resolve(pp[0]),aN:resolve(pp[1])}; });
 } else { for(var i=0;i<16;i++)names["r32_"+i]={hN:"",aN:""}; }
 for(var r=1;r<KO_ROUNDS.length;r++){ var R=KO_ROUNDS[r];
  for(var j=0;j<R.n;j++){ var pr=R.src[j];
   names[R.key+"_"+j]={hN:koWinnerName(pr[0][0]+"_"+pr[0][1],names)||"", aN:koWinnerName(pr[1][0]+"_"+pr[1][1],names)||""};
  }
 }
 return {names:names,seeded:seeded};
}
function koSection(){
 var C=koCompute(), names=C.names; var h="";
 var champ=koWinnerName("f_0",names);
 if(champ){ h+='<div class="champ"><small>Ô£ø√º√®√ú '+t("ko_champ")+'</small>'+flag(champ)+' '+champ+'</div>'; }
 if(!C.seeded){ h+='<div class="note">'+t("ko_need")+'</div>'; }
 else { h+='<div class="note">'+t("ko_auto")+'</div>'; }
 KO_ROUNDS.forEach(function(R){
  h+='<div class="ko-round"><h3>'+t(R.lab)+'</h3>';
  for(var i=0;i<R.n;i++){ var id=R.key+"_"+i; var n=names[id]||{hN:"",aN:""};
   var hN=n.hN,aN=n.aN,hS=koS(id,"hS")||"",aS=koS(id,"aS")||""; var w=koWinnerName(id,names);
   function row(nm,sc,side){ var cls=nm?(w===nm?"winner":"set"):"";
     return '<div class="ko-row"><span class="flag">'+(D.FLAG[nm]||"¬¨‚àë")+'</span>'+
      '<span class="ko-name '+cls+'">'+(nm?esc(nm):t("ko_tbd"))+'</span>'+
      '<input class="ko-sc" inputmode="numeric" maxlength="2" value="'+esc(sc)+'" onchange="koEdit(\''+id+'\',\''+side+'\',this.value)"'+(nm?"":" disabled")+'></div>'; }
   h+='<div class="ko-match">'+row(hN,hS,"hS")+row(aN,aS,"aS");
   if(hN&&aN&&hS!==""&&aS!==""&&parseInt(hS,10)===parseInt(aS,10)){ var pw=koS(id,"pen")||"";
    h+='<div class="pen">'+t("ko_pen")+' <select onchange="koEdit(\''+id+'\',\'pen\',this.value)"><option value="">‚Äö√Ñ√Æ</option><option value="h"'+(pw==="h"?" selected":"")+'>'+esc(hN)+'</option><option value="a"'+(pw==="a"?" selected":"")+'>'+esc(aN)+'</option></select></div>'; }
   h+='</div>';
  }
  h+='</div>';
 });
 return h;
}
function koEdit(id,f,v){ if(f==="hS"||f==="aS")v=v.replace(/[^0-9]/g,""); ST.koS[id]=ST.koS[id]||{}; ST.koS[id][f]=v; persist(); render(true); }

function exportData(){var blob=new Blob([JSON.stringify(ST)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="worldcup2026-backup.json";a.click();}
